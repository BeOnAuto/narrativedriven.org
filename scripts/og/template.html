<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,200;0,400;0,600;0,800;1,400&family=Albert+Sans:wght@300;400;500;600;700&display=block" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  font-family: 'Albert Sans', sans-serif;
}

/* ---- Dark theme (default) ---- */
body {
  background: #1a1a1a;
  color: rgba(255, 255, 255, 0.9);
}

body .text-secondary { color: rgba(255, 255, 255, 0.6); }
body .url-text { color: #f76d76; }

/* ---- Light theme ---- */
body.light {
  background: #ffffff;
  color: #232323;
}

body.light .text-secondary { color: #3c3c3c; }
body.light .url-text { color: #f5535e; }

/* Ambient glow */
body::before {
  content: '';
  position: absolute;
  top: -100px;
  left: -10%;
  width: 120%;
  height: 600px;
  background:
    radial-gradient(ellipse 40% 50% at 20% 30%, rgba(245, 83, 94, 0.12) 0%, transparent 70%),
    radial-gradient(ellipse 35% 45% at 50% 20%, rgba(23, 150, 219, 0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 35%, rgba(245, 83, 94, 0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body.light::before {
  background:
    radial-gradient(ellipse 40% 50% at 20% 30%, rgba(245, 83, 94, 0.08) 0%, transparent 70%),
    radial-gradient(ellipse 35% 45% at 50% 20%, rgba(23, 150, 219, 0.05) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 35%, rgba(245, 83, 94, 0.04) 0%, transparent 70%);
}

/* ---- Layout ---- */
.og-card {
  position: relative;
  width: 1200px;
  height: 630px;
  overflow: hidden;
}

/* Content */
.hero-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: row;
  align-items: center;
  padding: 0 72px;
  height: 100%;
  gap: 48px;
}

.hero-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero-name {
  font-family: 'Barlow', sans-serif;
  font-size: 4.8rem;
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: -0.04em;
  margin-bottom: 20px;
}

.hero-tagline-main {
  font-size: 2rem;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}

.hero-tagline-sub {
  font-size: 1.8rem;
  font-weight: 400;
  line-height: 1.3;
  letter-spacing: -0.01em;
  font-style: italic;
  margin-bottom: 32px;
}

.hero-url {
  font-size: 1.8rem;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* Logo area */
.hero-logo {
  flex: 0 0 320px;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
}

.logo-mark {
  width: 280px;
  height: 280px;
  border-radius: 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5535e;
}

body.light .logo-mark {
  background: #f5535e;
}

.logo-mark svg {
  width: 200px;
  height: 200px;
}

/* Bottom brand stripe */
.hero-stripe {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 10px;
  background: #f5535e;
  z-index: 10;
}

body.light .hero-stripe {
  background: #f5535e;
}

/* Top accent line */
.hero-stripe-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 5px;
  background: linear-gradient(120deg, #f5535e 0%, #1796db 100%);
  z-index: 10;
}
</style>
</head>
<body>
<div class="og-card">
  <!-- Top gradient stripe -->
  <div class="hero-stripe-top" aria-hidden="true"></div>

  <!-- Content -->
  <div class="hero-content">
    <div class="hero-text">
      <h1 class="hero-name">Narrative-Driven<br>Development</h1>
      <p class="hero-tagline-main">Tell the story. Build the software.</p>
      <p class="hero-tagline-sub text-secondary">One model for storyboard, docs, code, and tests.</p>
      <p class="hero-url url-text">narrativedriven.org</p>
    </div>
    <div class="hero-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M25.9872 7.18368C25.9872 6.99014 26.1445 6.83325 26.3385 6.83325H29.1488C29.3428 6.83325 29.5001 6.99014 29.5001 7.18368V9.9871C29.5001 10.1806 29.3428 10.3375 29.1488 10.3375H26.3385C26.1445 10.3375 25.9872 10.1806 25.9872 9.9871V7.18368Z" fill="white"/>
          <path d="M11.2334 9.28597C11.2334 9.00563 11.5496 8.83743 11.7814 8.99862L29.3455 20.794C29.4439 20.8571 29.5001 20.9692 29.5001 21.0814V24.4385C29.5001 24.7188 29.1839 24.887 28.9521 24.7258L11.388 12.9374C11.2896 12.8744 11.2334 12.7622 11.2334 12.6501V9.28597Z" fill="white"/>
          <path d="M11.2334 18.1728C11.2334 17.8925 11.5496 17.7243 11.7814 17.8855L29.3455 29.6809C29.4439 29.744 29.5001 29.8561 29.5001 29.9682V33.3253C29.5001 33.6057 29.1839 33.7739 28.9521 33.6127L11.388 21.8243C11.2896 21.7612 11.2334 21.6491 11.2334 21.537V18.1728Z" fill="white"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Bottom brand stripe -->
  <div class="hero-stripe" aria-hidden="true"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const theme = params.get('theme') || 'dark';
if (theme === 'light') {
  document.body.classList.add('light');
}
</script>
</body>
</html>
