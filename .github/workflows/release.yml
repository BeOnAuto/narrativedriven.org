name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @onauto/narrative build
      - run: pnpm --filter @onauto/narrative test
      - run: pnpm --filter @onauto/narrative type-check

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @onauto/narrative build

      - name: Version packages (if changesets exist)
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: echo "skip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm via OIDC
        if: steps.changesets.outputs.published != 'true'
        working-directory: packages/narrative
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @onauto/narrative version 2>/dev/null || echo "none")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "Publishing @onauto/narrative@$CURRENT (npm has $PUBLISHED)"
            npm publish --provenance --access public
          else
            echo "Version $CURRENT already published, skipping"
          fi
