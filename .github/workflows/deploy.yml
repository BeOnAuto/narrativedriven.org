name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chrome for OG screenshots
        run: pnpm --filter @onauto/narrativedriven-site exec puppeteer browsers install chrome
      - name: Regenerate OG images
        run: pnpm --filter @onauto/narrativedriven-site generate:og
      - name: Commit OG images if changed
        run: |
          if ! git diff --quiet -- site/docs/public/og-light.png site/docs/public/og-dark.png site/docs/public/og-image.png; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/docs/public/og-light.png site/docs/public/og-dark.png site/docs/public/og-image.png
            git commit -m "chore(og): regenerate OG images"
            git push
          fi
      - run: pnpm --filter @onauto/narrativedriven-site build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
