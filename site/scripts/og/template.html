<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,200;0,400;0,600;0,800;1,400&family=Albert+Sans:wght@300;400;500;600;700&display=block" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  font-family: 'Albert Sans', sans-serif;
}

/* ---- Dark theme (default) ---- */
body {
  background: #1a1a1a;
  color: rgba(255, 255, 255, 0.9);
}

body .text-secondary { color: rgba(255, 255, 255, 0.6); }
body .url-text { color: #f76d76; }

/* ---- Light theme ---- */
body.light {
  background: #ffffff;
  color: #232323;
}

body.light .text-secondary { color: #3c3c3c; }
body.light .url-text { color: #f5535e; }

/* ---- Layout ---- */
.og-card {
  position: relative;
  width: 1200px;
  height: 630px;
  overflow: hidden;
}

/* Wave background */
.wave-bg {
  position: absolute;
  top: -200px;
  left: 0;
  width: 100%;
  height: 1320px;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

.wave-bg svg {
  width: 100%;
  height: 100%;
}

/* Content */
.hero-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: row;
  align-items: center;
  padding: 0 72px;
  height: 100%;
  gap: 32px;
}

.hero-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
}

.hero-name {
  font-family: 'Barlow', sans-serif;
  font-size: 4.8rem;
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: -0.04em;
  margin-bottom: 20px;
}

.hero-tagline-main {
  font-size: 2rem;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}

.hero-tagline-sub {
  font-size: 1.8rem;
  font-weight: 400;
  line-height: 1.3;
  letter-spacing: -0.01em;
  font-style: italic;
  margin-bottom: 32px;
}

.hero-url {
  position: absolute;
  bottom: 28px;
  right: 72px;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  z-index: 11;
}

.hero-cta {
  display: inline-block;
  width: fit-content;
  margin-top: 20px;
  padding: 14px 36px;
  font-family: 'Albert Sans', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  border-radius: 8px;
  background: #f5535e;
  color: #fff;
  border: none;
}

body.light .hero-cta {
  background: #f5535e;
  color: #fff;
}

/* Hero illustrations grid */
.hero-illustrations {
  flex: 0 0 380px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 0;
  max-width: 380px;
}

.hero-img {
  width: 100%;
  height: auto;
}

/* Bottom brand stripe */
.hero-stripe {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 10px;
  background: #f5535e;
  z-index: 10;
}

/* Top accent line */
.hero-stripe-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 5px;
  background: linear-gradient(120deg, #f5535e 0%, #1796db 100%);
  z-index: 10;
}
</style>
</head>
<body>
<div class="og-card">
  <!-- Top gradient stripe -->
  <div class="hero-stripe-top" aria-hidden="true"></div>

  <!-- Wave background -->
  <div class="wave-bg" id="wave-bg" aria-hidden="true"></div>

  <!-- Content -->
  <div class="hero-content">
    <div class="hero-text">
      <h1 class="hero-name">Narrative-Driven<br>Development</h1>
      <p class="hero-tagline-main">Tell the story. Build the software.</p>
      <p class="hero-tagline-sub text-secondary">One model for storyboard, docs, code, and tests.</p>
      <div class="hero-cta">Learn How It Works &rarr;</div>
    </div>
    <div class="hero-illustrations" id="hero-illustrations"></div>
  </div>

  <!-- URL -->
  <p class="hero-url url-text">narrativedriven.org</p>

  <!-- Bottom brand stripe -->
  <div class="hero-stripe" aria-hidden="true"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const theme = params.get('theme') || 'dark';
const isDark = theme === 'dark';

if (!isDark) {
  document.body.classList.add('light');
}

// Wave background SVG (from WaveBackground.vue)
const startColor = isDark ? '#1a1a1a' : '#ffffff';
const endColor1 = isDark ? '#2a4a60' : '#a0ddff';
const endColor2 = isDark ? '#264055' : '#abdaf3';

document.getElementById('wave-bg').innerHTML = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1707 1320" fill="none" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="wg0" x1="384.5" y1="40" x2="384.5" y2="934.5" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="${startColor}" />
        <stop offset="1" stop-color="${endColor1}" />
      </linearGradient>
      <linearGradient id="wg1" x1="760.5" y1="510.6" x2="760.5" y2="-103.9" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="${startColor}" />
        <stop offset="1" stop-color="${endColor2}" />
      </linearGradient>
    </defs>
    <path fill="url(#wg0)" fill-opacity="0.5"
      d="M1707,577.2C653.2,961,672.5,181.1,0,226.5L0,0L1707,0L1707,577.2Z" />
    <path fill="url(#wg1)" fill-opacity="0.5"
      d="M0,.1L0,602L1707,602L1707,286C977,-296.5,652.5,397.5,0,.1Z"
      transform="translate(0, 680)" />
  </svg>`;

// Hero images (from HeroIllustrations.vue)
const suffix = isDark ? '-dark' : '';
const base = new URL('/', window.location.origin).href;
const grid = document.getElementById('hero-illustrations');
[1, 2, 3, 4].forEach(n => {
  const img = document.createElement('img');
  img.src = `${base}docs/public/images/hero-${n}${suffix}.png`;
  img.className = 'hero-img';
  img.alt = '';
  grid.appendChild(img);
});
</script>
</body>
</html>
